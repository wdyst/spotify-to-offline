name: Release

# Triggers on version tags: git tag v3.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create/update GitHub Releases

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: s2o-windows-x64.exe
            bin: s2o.exe

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: s2o-linux-x64
            bin: s2o

          - name: macOS x64 (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: s2o-macos-x64
            bin: s2o

          - name: macOS ARM64 (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: s2o-macos-arm64
            bin: s2o

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # notify-rust on Linux uses zbus (pure Rust D-Bus) — no libdbus needed.
      # zip/xz2 compile bundled C sources; pkg-config locates system headers
      # for anything that doesn't bundle. liblzma-dev covers lzma-sys.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y pkg-config liblzma-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
          fail_on_unmatched_files: true
